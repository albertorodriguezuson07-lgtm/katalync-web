<html lang="es">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script defer src="assets/alpine.min.js" integrity="sha384-9Ax3MmS9AClxJyd5/zafcXXjxmwFhZCdsT6HJoJjarvCaAkJlk5QDzjLJm+Wdx5F" crossorigin="anonymous"></script>
    <script defer src="https://image-tools-umami.reyl9a.easypanel.host/script.js" data-website-id="ecbee6b9-91c8-48ca-ad86-d38de4e82b97"></script>
    <style>
        :root {
            --primary: #0d9488;
            --primary-light: #14b8a6;
            --accent: #06b6d4;
            --navy: #0f172a;
            --navy-light: #1e293b;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --text-faint: #94a3b8;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, var(--primary), var(--accent));
            --gradient-subtle: linear-gradient(135deg, rgba(13,148,136,0.08), rgba(6,182,212,0.08));
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-xl: 0 24px 64px rgba(0,0,0,0.12);
            --shadow-teal: 0 8px 32px rgba(13,148,136,0.2);
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); line-height: 1.6; overflow-x: hidden; background: var(--white); -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; line-height: 1.15; letter-spacing: -0.02em; }
        .container { max-width: 1180px; margin: 0 auto; padding: 0 24px; }
        img { max-width: 100%; }

        /* ═══════════════ NAV ═══════════════ */
        .nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(226,232,240,0.6);
            padding: 12px 0;
            transition: box-shadow var(--transition);
        }
        .nav.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { height: 44px; }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 500; font-size: 14px; transition: color var(--transition); position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--gradient); border-radius: 1px; transition: width var(--transition); }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a:hover::after { width: 100%; }
        .nav-actions { display: flex; gap: 8px; align-items: center; }
        .lang-switch { display: flex; background: var(--surface); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); font-size: 12px; font-weight: 600; }
        .lang-switch button { padding: 6px 12px; border: none; background: transparent; cursor: pointer; transition: all var(--transition); color: var(--text-muted); font-family: inherit; font-weight: 600; }
        .lang-switch button.active { background: var(--gradient); color: white; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 22px; border-radius: 10px; font-weight: 600; font-size: 14px; text-decoration: none; transition: all var(--transition); cursor: pointer; border: none; font-family: inherit; line-height: 1.4; }
        .btn-primary { background: var(--gradient); color: white; box-shadow: var(--shadow-teal); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 40px rgba(13,148,136,0.3); }
        .btn-primary:active { transform: translateY(0); }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1.5px solid var(--border); }
        .btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: rgba(13,148,136,0.04); }
        .btn-white { background: white; color: var(--primary); font-weight: 700; box-shadow: var(--shadow-md); }
        .btn-white:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
        .btn-outline-white { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.4); }
        .btn-outline-white:hover { border-color: white; background: rgba(255,255,255,0.1); }
        .btn-lg { padding: 14px 32px; font-size: 15px; border-radius: 12px; }

        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
        .hamburger span { width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
        .mobile-menu { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 28px; }
        .mobile-menu.open { display: flex; }
        .mobile-menu a { font-size: 18px; text-decoration: none; color: var(--text); font-weight: 600; }
        .mobile-close { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; background: none; border: none; color: var(--text-muted); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }

        /* ═══════════════ HERO ═══════════════ */
        .hero {
            position: relative;
            padding: 80px 0 100px;
            background: var(--navy);
            overflow: hidden;
        }
        .hero-bg-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .hero-bg-glow1 {
            position: absolute; top: -200px; right: -100px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 60%);
            border-radius: 50%; filter: blur(40px);
            animation: float 8s ease-in-out infinite;
        }
        .hero-bg-glow2 {
            position: absolute; bottom: -200px; left: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(13,148,136,0.1) 0%, transparent 60%);
            border-radius: 50%; filter: blur(40px);
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; position: relative; z-index: 1; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(13,148,136,0.12); border: 1px solid rgba(13,148,136,0.2);
            border-radius: 100px; padding: 6px 16px 6px 8px;
            font-size: 13px; font-weight: 500; color: var(--accent);
            margin-bottom: 24px;
        }
        .hero-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }

        .hero h1 { font-size: clamp(2.4rem, 4.5vw, 3.6rem); color: white; margin-bottom: 20px; }
        .hero h1 .gradient-text { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-sub { color: var(--text-faint); font-size: 17px; line-height: 1.7; margin-bottom: 36px; max-width: 480px; }

        .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 48px; }

        .hero-stats { display: flex; gap: 40px; }
        .hero-stat { text-align: left; }
        .hero-stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: white; line-height: 1; }
        .hero-stat-value .accent { color: var(--accent); }
        .hero-stat-label { font-size: 13px; color: var(--text-faint); margin-top: 4px; }

        /* Dashboard mockup */
        .hero-visual { position: relative; }
        .mockup {
            background: var(--navy-light);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.06);
            padding: 20px; position: relative;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .mockup-dots { display: flex; gap: 6px; margin-bottom: 16px; }
        .mockup-dots span { width: 10px; height: 10px; border-radius: 50%; }
        .mockup-dots span:nth-child(1) { background: #ef4444; }
        .mockup-dots span:nth-child(2) { background: #eab308; }
        .mockup-dots span:nth-child(3) { background: #22c55e; }
        .mockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mockup-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 14px; }
        .mockup-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .mockup-val { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; color: white; }
        .mockup-val.teal { color: var(--accent); }
        .mockup-bar { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .mockup-bar-fill { height: 100%; background: var(--gradient); border-radius: 3px; transition: width 1.5s cubic-bezier(0.4,0,0.2,1); }
        .mockup-wide { grid-column: 1 / -1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 14px; }
        .mockup-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .mockup-row:last-child { border-bottom: none; }
        .mockup-status { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
        .mockup-status.warn { background: #eab308; }
        .mockup-text { height: 7px; background: rgba(255,255,255,0.06); border-radius: 4px; }
        .mockup-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .mockup-badge.green { background: rgba(34,197,94,0.15); color: #4ade80; }
        .mockup-badge.yellow { background: rgba(234,179,8,0.15); color: #facc15; }
        .mockup-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(6,182,212,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ═══════════════ SECTIONS ═══════════════ */
        .section { padding: 100px 0; }
        .section-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--gradient-subtle); color: var(--primary); font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 100px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.04em; }
        .section-title { font-size: clamp(1.8rem, 3.5vw, 2.6rem); margin-bottom: 16px; color: var(--text); }
        .section-desc { font-size: 16px; color: var(--text-muted); max-width: 560px; margin: 0 auto 56px; line-height: 1.7; }

        /* ═══════════════ METRICS ROW ═══════════════ */
        .metrics {
            background: var(--white);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 48px 0;
            position: relative;
        }
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; text-align: center; }
        .metric-item { position: relative; }
        .metric-item:not(:last-child)::after {
            content: ''; position: absolute; right: -16px; top: 10%; height: 80%;
            width: 1px; background: var(--border);
        }
        .metric-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 700;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1;
        }
        .metric-label { font-size: 14px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }

        /* ═══════════════ BEFORE/AFTER ═══════════════ */
        .transform-section { background: var(--surface); }
        .transform-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; align-items: center; max-width: 900px; margin: 0 auto; }
        .transform-card { border-radius: var(--radius-lg); padding: 32px; position: relative; overflow: hidden; }
        .transform-card.before { background: #fef2f2; border: 1px solid #fecaca; }
        .transform-card.after { background: #f0fdfa; border: 1px solid #99f6e4; }
        .transform-card-tag {
            display: inline-flex; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px;
        }
        .transform-card.before .transform-card-tag { background: #fecaca; color: #991b1b; }
        .transform-card.after .transform-card-tag { background: #99f6e4; color: #065f46; }
        .transform-card h3 { font-size: 18px; margin-bottom: 16px; }
        .transform-list { list-style: none; }
        .transform-list li { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--text-secondary); }
        .transform-list li svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; }
        .transform-arrow { display: flex; align-items: center; justify-content: center; }
        .transform-arrow-icon {
            width: 56px; height: 56px; border-radius: 50%;
            background: var(--gradient); display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-teal);
            animation: pulse-arrow 2.5s ease-in-out infinite;
        }
        @keyframes pulse-arrow { 0%,100% { box-shadow: var(--shadow-teal); } 50% { box-shadow: 0 8px 40px rgba(13,148,136,0.4); } }
        .transform-arrow-icon svg { width: 24px; height: 24px; color: white; }

        /* ═══════════════ ROI CALCULATOR ═══════════════ */
        .roi-section { background: var(--navy); color: white; position: relative; overflow: hidden; }
        .roi-section::before {
            content: ''; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(148,163,184,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; position: relative; z-index: 1; }
        .roi-input-group { margin-bottom: 24px; }
        .roi-label { font-size: 14px; color: var(--text-faint); margin-bottom: 8px; font-weight: 500; }
        .roi-slider-container { position: relative; }
        .roi-slider {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
            background: rgba(255,255,255,0.1); border-radius: 3px; outline: none;
        }
        .roi-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: var(--gradient); cursor: pointer; box-shadow: 0 2px 8px rgba(13,148,136,0.4);
            border: 3px solid white;
        }
        .roi-slider-value {
            font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700;
            color: white; margin-top: 8px;
        }
        .roi-results { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .roi-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius); padding: 24px; text-align: center;
        }
        .roi-card-value {
            font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1; margin-bottom: 6px;
        }
        .roi-card-label { font-size: 13px; color: var(--text-faint); }
        .roi-card.highlight {
            grid-column: 1 / -1;
            background: rgba(13,148,136,0.1); border-color: rgba(13,148,136,0.3);
        }

        /* ═══════════════ HOW IT WORKS ═══════════════ */
        .steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; position: relative; }
        .steps-grid::before {
            content: ''; position: absolute; top: 44px; left: 12%; right: 12%;
            height: 2px; background: var(--gradient); opacity: 0.2;
        }
        .step-card { text-align: center; position: relative; z-index: 1; }
        .step-icon {
            width: 88px; height: 88px; border-radius: 50%;
            background: var(--gradient);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-teal);
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .step-card:hover .step-icon { transform: scale(1.08); box-shadow: 0 12px 40px rgba(13,148,136,0.35); }
        .step-icon svg { width: 36px; height: 36px; color: white; }
        .step-num { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
        .step-card h3 { font-size: 15px; color: var(--text); font-weight: 600; }

        /* ═══════════════ FEATURES ═══════════════ */
        .features-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
        .feature-card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 24px;
            transition: all var(--transition); position: relative; overflow: hidden;
        }
        .feature-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--gradient); opacity: 0; transition: opacity var(--transition);
        }
        .feature-card:hover { border-color: transparent; box-shadow: var(--shadow-lg); transform: translateY(-4px); }
        .feature-card:hover::before { opacity: 1; }
        .feature-icon-wrap {
            width: 48px; height: 48px; border-radius: var(--radius);
            background: var(--gradient); display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
        }
        .feature-icon-wrap svg { width: 24px; height: 24px; color: white; }
        .feature-card h3 { font-size: 17px; margin-bottom: 8px; }
        .feature-card p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }
        .feature-card .feature-stat {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 12px; padding: 4px 10px; border-radius: 6px;
            background: var(--gradient-subtle); font-size: 12px; font-weight: 600; color: var(--primary);
        }

        /* ═══════════════ INTEGRATIONS ═══════════════ */
        .integrations-section { background: var(--surface); }
        .logos-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .logo-badge {
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 36px;
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px;
            color: var(--text); transition: all var(--transition);
            cursor: default;
        }
        .logo-badge:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-2px); }

        /* ═══════════════ TRUST ═══════════════ */
        .trust-bar {
            display: flex; justify-content: center; gap: 48px; flex-wrap: wrap;
            padding: 32px 0; margin-top: 40px;
            border-top: 1px solid var(--border);
        }
        .trust-item { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .trust-icon { width: 20px; height: 20px; color: var(--primary); }

        /* ═══════════════ PRICING ═══════════════ */
        .pricing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 900px; margin: 0 auto; }
        .pricing-card {
            background: var(--white); border: 2px solid var(--border);
            border-radius: var(--radius-xl); padding: 40px;
            text-align: center;
            transition: all var(--transition); position: relative;
        }
        .pricing-card:hover { border-color: var(--primary); box-shadow: 0 20px 60px rgba(13,148,136,0.1); }
        .pricing-card.featured { border-color: var(--primary); background: linear-gradient(180deg, rgba(13,148,136,0.03) 0%, var(--white) 100%); }
        .pricing-card.featured::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient); border-radius: var(--radius-xl) var(--radius-xl) 0 0; }
        .pricing-badge { display: inline-block; background: var(--gradient); color: white; font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
        .pricing-card h3 { font-size: 22px; margin-bottom: 6px; }
        .pricing-price { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
        .pricing-price span { font-size: 16px; font-weight: 500; color: var(--text-muted); }
        .pricing-card .price-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

        .pricing-list li svg { width: 20px; height: 20px; color: var(--primary); flex-shrink: 0; margin-top: 1px; }
        @media (max-width: 768px) { .pricing-grid { grid-template-columns: 1fr; } }

        /* ═══════════════ FAQ ═══════════════ */
        .faq-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: all var(--transition); }
        .faq-item:hover { border-color: #cbd5e1; }
        .faq-q { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-weight: 600; font-size: 15px; color: var(--text); background: none; border: none; width: 100%; text-align: left; font-family: inherit; }
        .faq-q:hover { color: var(--primary); }
        .faq-chevron { width: 18px; height: 18px; transition: transform 0.3s ease; color: var(--text-faint); flex-shrink: 0; }
        .faq-chevron.open { transform: rotate(180deg); }
        .faq-a { padding: 0 22px 18px; font-size: 14px; color: var(--text-muted); line-height: 1.7; }

        /* ═══════════════ CTA FINAL ═══════════════ */
        .cta-final {
            background: var(--navy); padding: 80px 0; text-align: center;
            position: relative; overflow: hidden;
        }
        .cta-final::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(13,148,136,0.1) 0%, transparent 60%);
            filter: blur(60px);
        }
        .cta-final h2 { color: white; font-size: clamp(1.8rem, 3vw, 2.4rem); margin-bottom: 14px; position: relative; z-index: 1; }
        .cta-final p { color: var(--text-faint); font-size: 16px; margin-bottom: 32px; position: relative; z-index: 1; }
        .cta-final .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; position: relative; z-index: 1; }

        /* ═══════════════ FOOTER ═══════════════ */
        .footer { background: var(--navy); border-top: 1px solid rgba(255,255,255,0.06); padding: 40px 0; color: var(--text-faint); }
        .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .footer a { color: var(--text-faint); text-decoration: none; font-size: 13px; transition: color var(--transition); }
        .footer a:hover { color: var(--accent); }
        .footer-links { display: flex; gap: 24px; }

        /* ═══════════════ MODAL ═══════════════ */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(8px); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .modal { background: white; border-radius: var(--radius-xl); padding: 40px; width: 100%; max-width: 400px; position: relative; box-shadow: var(--shadow-xl); }
        .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-faint); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all var(--transition); }
        .modal-close:hover { background: var(--surface); color: var(--text); }
        .modal h2 { font-size: 20px; margin-bottom: 4px; }
        .modal .modal-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; transition: all var(--transition); outline: none; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.08); }
        .form-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }

        /* ═══════════════ SCROLL PROGRESS BAR ═══════════════ */
        .scroll-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--gradient); z-index: 10001; transition: width 0.1s linear; }

        /* ═══════════════ PARTICLES ═══════════════ */
        .hero-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: rgba(6,182,212,0.4); animation: particleFloat linear infinite;
        }
        .particle:nth-child(odd) { background: rgba(13,148,136,0.35); }
        .particle:nth-child(1) { left: 10%; top: 20%; width: 3px; height: 3px; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 60%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 35%; top: 40%; width: 3px; height: 3px; animation-duration: 18s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 50%; top: 75%; width: 4px; height: 4px; animation-duration: 13s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 65%; top: 30%; width: 6px; height: 6px; animation-duration: 16s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 80%; top: 55%; width: 3px; height: 3px; animation-duration: 14s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 90%; top: 15%; width: 4px; height: 4px; animation-duration: 17s; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 45%; top: 85%; width: 5px; height: 5px; animation-duration: 11s; animation-delay: 0.5s; }
        @keyframes particleFloat {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-120px) translateX(30px) scale(1.2); opacity: 0.6; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-250px) translateX(-20px) scale(0.8); opacity: 0; }
        }

        /* ═══════════════ TYPING CURSOR ═══════════════ */
        .typing-cursor { display: inline-block; width: 3px; height: 0.9em; background: var(--accent); margin-left: 4px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        /* ═══════════════ FEATURE CARD SHIMMER ═══════════════ */
        .feature-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(13,148,136,0.04), transparent);
            transition: none; pointer-events: none;
        }
        .feature-card:hover::after { animation: shimmer 0.8s ease forwards; }
        @keyframes shimmer { to { left: 150%; } }

        /* ═══════════════ WAVE DIVIDERS ═══════════════ */
        .wave-divider { position: relative; width: 100%; overflow: hidden; line-height: 0; }
        .wave-divider svg { position: relative; display: block; width: calc(100% + 1.3px); height: 60px; }
        .wave-divider.flip { transform: rotate(180deg); }
        .wave-top svg { fill: var(--surface); }
        .wave-dark svg { fill: var(--navy); }
        .wave-white svg { fill: var(--white); }

        /* ═══════════════ ROI MINI CHART ═══════════════ */
        .roi-chart { margin-top: 24px; padding: 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); }
        .roi-chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
        .roi-chart-bar { flex: 1; border-radius: 4px 4px 0 0; transition: height 1s cubic-bezier(0.4,0,0.2,1); position: relative; min-height: 4px; }
        .roi-chart-bar.manual { background: rgba(239,68,68,0.3); border: 1px solid rgba(239,68,68,0.4); }
        .roi-chart-bar.auto { background: var(--gradient); }
        .roi-chart-labels { display: flex; justify-content: space-around; margin-top: 8px; font-size: 11px; color: var(--text-faint); }
        .roi-chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 10px; font-size: 11px; color: var(--text-faint); }
        .roi-chart-legend span { display: flex; align-items: center; gap: 5px; }
        .roi-chart-legend .dot { width: 8px; height: 8px; border-radius: 2px; }
        .roi-chart-legend .dot.red { background: rgba(239,68,68,0.5); }
        .roi-chart-legend .dot.teal { background: var(--primary); }

        /* ═══════════════ SOCIAL PROOF / URGENCY ═══════════════ */
        .social-proof-float {
            position: fixed; bottom: 24px; left: 24px; z-index: 9000;
            background: white; border-radius: var(--radius); padding: 14px 18px;
            box-shadow: var(--shadow-lg); border-left: 3px solid var(--primary);
            display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary);
            transform: translateX(-120%); transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
            max-width: 320px;
        }
        .social-proof-float.show { transform: translateX(0); }
        .social-proof-float .sp-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--gradient-subtle); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .social-proof-float .sp-icon svg { width: 16px; height: 16px; color: var(--primary); }
        .social-proof-float .sp-close { position: absolute; top: 4px; right: 6px; background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-faint); line-height: 1; padding: 4px; }

        /* ═══════════════ PRICING MICRO ═══════════════ */
        .pricing-micro { font-size: 13px; color: var(--text-muted); margin-top: 12px; font-weight: 500; }

        /* ═══════════════ LOGO BADGES RESPONSIVE ═══════════════ */
        .logo-badge { min-width: 0; text-align: center; white-space: nowrap; }

        /* ═══════════════ ANIMATIONS ═══════════════ */
        @media (prefers-reduced-motion: no-preference) {
            .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1); }
            .reveal.visible { opacity: 1; transform: translateY(0); }
            .reveal-left { opacity: 0; transform: translateX(-28px); transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1); }
            .reveal-left.visible { opacity: 1; transform: translateX(0); }
            .reveal-right { opacity: 0; transform: translateX(28px); transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1); }
            .reveal-right.visible { opacity: 1; transform: translateX(0); }
            .stagger-1 { transition-delay: 0.05s; }
            .stagger-2 { transition-delay: 0.1s; }
            .stagger-3 { transition-delay: 0.15s; }
            .stagger-4 { transition-delay: 0.2s; }
        }
        @media (prefers-reduced-motion: reduce) {
            .reveal, .reveal-left, .reveal-right { opacity: 1; transform: none; transition: none; }
            .particle { display: none; }
            .typing-cursor { display: none; }
        }

        /* ═══════════════ RESPONSIVE ═══════════════ */
        @media (max-width: 1024px) {
            .hero-inner { grid-template-columns: 1fr; gap: 48px; }
            .hero-visual { max-width: 480px; margin: 0 auto; }
            .roi-grid { grid-template-columns: 1fr; gap: 40px; }
        }
        @media (max-width: 768px) {
            .nav-links, .nav-actions { display: none !important; }
            .hamburger { display: flex; }

            .hero h1 { font-size: 2rem; }
            .hero-stats { gap: 24px; }
            .hero-stat-value { font-size: 22px; }
            .section { padding: 64px 0; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
            .metric-item:nth-child(2)::after { display: none; }
            .steps-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
            .steps-grid::before { display: none; }
            .features-grid { grid-template-columns: repeat(3, 1fr); }
            .transform-grid { grid-template-columns: 1fr; }
            .transform-arrow { transform: rotate(90deg); }
            .footer-inner { flex-direction: column; text-align: center; }
            .footer-links { justify-content: center; }
            .logos-row { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 12px; }
            .logo-badge { padding: 12px 20px; font-size: 14px; }
            .trust-bar { gap: 20px; flex-direction: column; align-items: center; }
            .hero-buttons { justify-content: center; }
            .social-proof-float { left: 12px; right: 12px; max-width: none; bottom: 12px; }
            .wave-divider svg { height: 36px; }
        }
        @media (max-width: 480px) {
            .steps-grid { grid-template-columns: 1fr; }
            .features-grid { grid-template-columns: 1fr; }
            .hero-stats { flex-direction: column; gap: 16px; }
            .hero-buttons { flex-direction: column; align-items: stretch; }
            .mockup-grid { grid-template-columns: 1fr; }
            .roi-results { grid-template-columns: 1fr; }
        }

            init() {
                this.calcRoi();

                window.addEventListener('scroll', () => {
                    this.scrollY = window.scrollY;
                    const docH = document.documentElement.scrollHeight - window.innerHeight;
                    this.scrollPercent = docH > 0 ? (window.scrollY / docH) * 100 : 0;
                }, { passive: true });

                const revealObs = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
                }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
                document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => revealObs.observe(el));

                const counterObs = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting && !this.countersAnimated) {
                            this.countersAnimated = true;
                            this.animateCounter(this.$refs.stat1, 0, 50000, 2000, v => v.toLocaleString());
                            this.animateCounter(this.$refs.stat2, 0, 98.2, 2000, v => v.toFixed(1));
                            this.animateCounter(this.$refs.stat3, 0, 2, 1500, v => '<' + v);
                            this.animateCounter(this.$refs.mockupProducts, 0, 2847, 2000, v => v.toLocaleString());
                            this.animateCounter(this.$refs.mockupValidated, 0, 98.2, 2000, v => v.toFixed(1) + '%');
                            setTimeout(() => { if(this.$refs.bar1) this.$refs.bar1.style.width = '78%'; }, 300);
                            setTimeout(() => { if(this.$refs.bar2) this.$refs.bar2.style.width = '98%'; }, 500);
                        }
                    });
                }, { threshold: 0.3 });
                if (this.$refs.stat1) counterObs.observe(this.$refs.stat1.closest('.hero'));

                const metricObs = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting && !this.metricsAnimated) {
                            this.metricsAnimated = true;
                            this.animateCounter(this.$refs.m1, 0, 50000, 2000, v => v.toLocaleString() + '+');
                            this.animateCounter(this.$refs.m2, 0, 120, 1800, v => v + 'h');
                            this.animateCounter(this.$refs.m3, 0, 98.2, 1600, v => v.toFixed(1) + '%');
                            this.animateCounter(this.$refs.m4, 0, 15, 1400, v => v + 'x');
                        }
                    });
                }, { threshold: 0.3 });
                if (this.$refs.m1) metricObs.observe(this.$refs.m1.closest('.metrics'));

                const proofsEs = ['Un seller acaba de procesar 2.400 productos', 'Demo solicitada hace 3 minutos', 'Nuevo catálogo validado con 0 errores', '3 sellers activos esta semana'];
                const proofsPt = ['Um seller acaba de processar 2.400 produtos', 'Demo solicitada há 3 minutos', 'Novo catálogo validado com 0 erros', '3 sellers ativos esta semana'];
                let pi = 0;
                const showProof = () => {
                    const proofs = this.lang === 'es' ? proofsEs : proofsPt;
                    this.socialProofMsg = proofs[pi % proofs.length];
                    this.socialProofShow = true;
                    pi++;
                    setTimeout(() => { this.socialProofShow = false; }, 5000);
                };
                setTimeout(showProof, 8000);
                setInterval(showProof, 25000);
            },

            animateCounter(el, start, end, duration, fmt) {
                if (!el) return;
                const startTime = performance.now();
                const isFloat = !Number.isInteger(end);
                const step = (now) => {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const current = start + (end - start) * eased;
                    el.textContent = fmt(isFloat ? current : Math.round(current));
                    if (progress < 1) requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            },

            calcRoi() {
                const skus = Number(this.roiSkus);
                const freq = Number(this.roiFreq);
                const manualMinsPerSku = 0.8;
                const autoMinsPerSku = 0.02;
                this.roiManualHours = Math.round((skus * manualMinsPerSku * freq) / 60);
                this.roiAutoMinutes = Math.round(skus * autoMinsPerSku * freq);
                this.roiSaved = Math.round(this.roiManualHours - (this.roiAutoMinutes / 60));
            },

            _loginAttempts: [],
            async doLogin() {
                this.loginError = '';
                const now = Date.now();
                this._loginAttempts = this._loginAttempts.filter(t => now - t < 60000);
                if (this._loginAttempts.length >= 5) {
                    this.loginError = this.lang === 'es' ? 'Demasiados intentos. Espera 1 minuto.' : 'Muitas tentativas. Aguarde 1 minuto.';
                    return;
                }
                this._loginAttempts.push(now);
                this.loginLoading = true;
                try {
                    const res = await fetch('https://api.katalync.com/webhook/auth-login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.loginEmail, password: this.loginPassword })
                    });
                    const data = await res.json();
                    if (res.ok && data.token) {
                        localStorage.setItem('authToken', data.token);
                        this.loginPassword = '';
                        window.location.href = '/app';
                    } else {
                        this.loginError = this.t.login.error;
                        this.loginPassword = '';
                    }
                } catch (e) {
                    this.loginError = this.t.login.error;
                    this.loginPassword = '';
                }
                this.loginLoading = false;
            }
        };
    }
