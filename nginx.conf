limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://image-tools-umami.reyl9a.easypanel.host; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://pub-3dd3844245694c3f82abf1a5f3f07c43.r2.dev https://*.supabase.co; connect-src 'self' https://api.katalync.com https://prometeix-servidor-supabase.reyl9a.easypanel.host https://checkout.stripe.com https://image-tools-umami.reyl9a.easypanel.host blob:; frame-src https://checkout.stripe.com https://billing.stripe.com;" always;

    location = /app {
        default_type text/html;
        try_files /app.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
        limit_req zone=general burst=50 nodelay;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
